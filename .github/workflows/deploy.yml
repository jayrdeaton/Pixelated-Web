name: Deploy
run-name: Deploy ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Test
        run: npm test
        env:
          NODE_OPTIONS: --no-experimental-webstorage

      - run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NITRO_PRESET: vercel

      - name: Bundle sharp native libraries
        run: |
          SRC="node_modules/@img/sharp-libvips-linux-x64"
          if [ -d "$SRC" ]; then
            for func_dir in .vercel/output/functions/*.func; do
              if [ -d "$func_dir" ]; then
                DEST="$func_dir/node_modules/@img/sharp-libvips-linux-x64"
                mkdir -p "$DEST"
                cp -rn "$SRC/." "$DEST/"
                echo "Copied sharp libvips to $DEST"
                ls "$DEST/lib/" 2>/dev/null || echo "lib dir missing"
              fi
            done
          else
            echo "sharp-libvips-linux-x64 not found in node_modules (expected on linux)"
          fi

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
